[DEFAULT]
app_name = Portfolio Manager
version = 0.2.0
debug = false

[database]
type = csv
data_dir = data
auto_backup = true
backup_count = 10

[initial_portfolio]
enabled = false
transactions_csv = 
auto_load_on_start = false
clear_existing_on_load = false

[auth]
enabled = true
token_expire_minutes = 30
secret_key = change-me-in-production
algorithm = HS256

[api]
host = 0.0.0.0
port = 8000
reload = true
cors_origins = *
username = 
password = 

[logging]
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
file = logs/portfolio_manager.log
max_bytes = 10485760
backup_count = 5

